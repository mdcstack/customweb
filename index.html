<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee Adventure? ☕</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        overflow: hidden;
        height: 100vh;
        /* Cozy latte/mocha gradient */
        background: linear-gradient(135deg, #d4a373, #faedcd);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        transition: background 1s ease; 
    }

    /* Floating Cafe Items */
    .floating-item {
        position: absolute;
        bottom: -50px;
        /* Rich espresso color for the floating icons (affects monochrome emojis mostly) */
        color: rgba(92, 64, 51, 0.7); 
        font-size: 20px;
        animation: floatUp linear forwards;
        user-select: none;
        pointer-events: none;
        z-index: 1; 
        transition: color 0.5s ease, text-shadow 0.5s ease; 
    }

    /* --- The Success State Floating Items --- */
    body.success .floating-item {
        /* Darker, glowing coffee brown on success */
        color: #4a3219; 
        text-shadow: 0 0 12px rgba(111, 78, 55, 0.6); 
    }

    @keyframes floatUp {
        0% { transform: translateY(0) rotate(0deg); opacity: 0; }
        10% { opacity: 1; }
        100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }

    /* --- Modal & Button CSS --- */
    .modal {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(255, 255, 255, 0.95);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        text-align: center;
        z-index: 10; 
        min-width: 320px;
        max-width: 90%; /* Slightly wider for mobile screens */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 200px;
        overflow: hidden; /* NEW: Forces everything to stay inside the white box */
    }

    h1 {
        /* Mocha text color */
        color: #5c4033;
        margin-bottom: 30px;
        font-size: 28px;
        line-height: 1.4;
    }

    /* --- The Smart Blinking Cursor --- */
    .typing-active::after {
        content: '|';
        animation: blink 0.7s infinite;
    }

    @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
    }

    .bounce-dot {
        display: inline-block;
        animation: bounceDot 0.5s infinite alternate;
    }

    .bounce-dot:nth-child(1) { animation-delay: 0s; }
    .bounce-dot:nth-child(2) { animation-delay: 0.15s; }
    .bounce-dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounceDot {
        0% { transform: translateY(0); }
        100% { transform: translateY(-8px); }
    }

    .button-container {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap; /* NEW: Pushes the 'No' button down instead of off-screen */
        width: 100%; /* NEW: Ensures the container respects the modal's edges */
    }

    button {
        padding: 12px 24px;
        font-size: 18px;
        font-weight: bold;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s ease; 
        
        /* The fixes for the growing button: */
        max-width: 100%; /* NEW: Stops the button from growing wider than the modal */
        white-space: normal; /* NEW: Replaces nowrap so text can wrap safely */
        word-break: break-word; /* NEW: Breaks long words if the font gets gigantic */
    }

    /* Continue Button Specific Styling */
    #continue-btn {
        background-color: #6f4e37; /* Coffee brown */
        color: white;
        margin-top: 10px;
        animation: pulse 1.5s infinite alternate;
    }
    
    #continue-btn:hover { background-color: #4a3219; transform: scale(1.05); }

    @keyframes pulse {
        0% { transform: scale(1); }
        100% { transform: scale(1.05); }
    }

    #yes-btn { background-color: #6f4e37; color: white; }
    #yes-btn:hover { background-color: #4a3219; }
    #no-btn { background-color: #e6d5b8; color: #5c4033; }
    #no-btn:hover { background-color: #d4a373; color: white; }

    @keyframes fadeInEffect {
        0% { opacity: 0; transform: translateY(10px); }
        100% { opacity: 1; transform: translateY(0); }
    }

    .fade-in {
        animation: fadeInEffect 1.5s ease-out forwards;
    }

    /* --- Emoji Burst Animation --- */
    .burst-emoji {
        position: fixed;
        font-size: 35px;
        pointer-events: none; 
        z-index: 20; 
        animation: popAndFade 1.5s ease-out forwards;
    }

    @keyframes popAndFade {
        0% { transform: scale(0) translateY(0); opacity: 1; }
        40% { transform: scale(1.2) translateY(-30px); opacity: 1; }
        100% { transform: scale(1) translateY(-80px); opacity: 0; }
    }
</style>
</head>
<body>

<audio id="bg-music" loop>
    <source src="bg-music.mp3" type="audio/mpeg">
</audio>

<div class="modal">
    <h1 id="typing-text"></h1>

    <div id="continue-container" style="display: none; opacity: 0; flex-direction: column; align-items: center;">
        <h1 style="font-size: 24px; margin-bottom: 20px;">syempre let's set the mood muna,<br> plss click to continue</h1>
        <button id="continue-btn">Continue</button>
    </div>

    <div id="main-content" style="display: none; opacity: 0;">
        <h1 id="question">Will you go coffee hopping with me?</h1>
        <div class="button-container">
            <button id="yes-btn">Yes</button>
            <button id="no-btn">No</button>
        </div>
    </div>
</div>

<script>
    /* --- The Webhook Function --- */
    function sendTime(time) {
        // 🚨 PASTE YOUR DISCORD WEBHOOK URL IN THE QUOTES BELOW 🚨
        const webhookURL = "https://discord.com/api/webhooks/1516056035008315422/mJ48pvdnGBAtgzg2rK_MF1CDgUurOECfnVEj6ogfa8TfmmQ9HLakc1kyTNAcrkMVxo-Q";
        
        fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                content: `☕ **Coffee Alert!** Cutie said YES and wants to meet this Friday at **${time}** at SM Dasma! 🎉` 
            })
        }).then(response => {
            console.log("Webhook sent successfully!");
        }).catch(err => {
            console.error("Error sending webhook:", err);
        });
    }

    /* --- Cafe Items Animation JS --- */
    function createFloatingItem() {
        const item = document.createElement("div");
        item.classList.add("floating-item");
        
        // Randomly pick between coffee, croissant, and cookie
        const cafeEmojis = ["☕", "🥐", "🍪"];
        item.innerHTML = cafeEmojis[Math.floor(Math.random() * cafeEmojis.length)]; 
        
        item.style.left = Math.random() * window.innerWidth + "px";
        const size = Math.random() * 30 + 15;
        item.style.fontSize = size + "px";
        const duration = Math.random() * 6 + 6;
        item.style.animationDuration = duration + "s";
        item.style.opacity = Math.random();
        document.body.appendChild(item);

        setTimeout(() => { item.remove(); }, duration * 1000);
    }

    const isMobile = window.innerWidth < 768;
    const spawnRate = isMobile ? 150 : 50;
    
    setInterval(createFloatingItem, spawnRate);

    /* --- The Typing Animation Logic --- */
    const typingText = document.getElementById("typing-text");
    const mainContent = document.getElementById("main-content");
    const questionText = document.getElementById("question");
    const continueContainer = document.getElementById("continue-container");
    const continueBtn = document.getElementById("continue-btn");
    
    // Intro Phrases
    const phrase1 = "hi po cutiee";
    const phrase2 = "I wanna ask you a question";
    const phrase3 = "I know you're smart kaya madali mo to masasagot";
    const phrase4 = "since you're up for the task";
    const phrase5 = "here it goes";

    // Post-Yes Phrases
    const endPhrase1 = "glad you picked the right option";
    const endPhrase2 = "you did agree as fast you can right 🤨";
    const endPhrase3 = "no worries I trust you cutiee so";
    const endPhrase4 = "no pressure and I hope you are as excited as I am ☕"; 
    const endPhrase5 = "there's just one more thing I wanna ask you";
    
    const typingSpeed = 80; 
    const pauseBetweenPhrases = 2500; 

    function typeWriter(element, text, i, callback) {
        if (i === 0) {
            element.classList.add("typing-active");
        }

        const characters = Array.from(text); 
        
        if (i < characters.length) {
            element.innerHTML += characters[i];
            setTimeout(() => typeWriter(element, text, i + 1, callback), typingSpeed);
        } else {
            element.classList.remove("typing-active");
            element.innerHTML += '<span class="bounce-dot">.</span><span class="bounce-dot">.</span><span class="bounce-dot">.</span>';
            setTimeout(callback, pauseBetweenPhrases);
        }
    }

    function startSequence() {
        typeWriter(typingText, phrase1, 0, () => {
            typingText.innerHTML = ""; 
            typeWriter(typingText, phrase2, 0, () => {
                typingText.innerHTML = ""; 
                typeWriter(typingText, phrase3, 0, () => {
                    typingText.style.display = "none"; 
                    continueContainer.style.display = "flex";
                    continueContainer.classList.add("fade-in");
                });
            });
        });
    }

    window.onload = startSequence;

    /* --- Audio Trigger Logic --- */
    const bgMusic = document.getElementById("bg-music");
    let isMusicPlaying = false; 

    function startMusic() {
        if (!isMusicPlaying) {
            bgMusic.currentTime = 18; 
            bgMusic.volume = 0; 
            
            bgMusic.play().catch(e => console.log("Audio error:", e));
            isMusicPlaying = true; 
            
            const fadeAudio = setInterval(() => {
                if (bgMusic.volume < 1.0) {
                    bgMusic.volume = Math.min(1.0, bgMusic.volume + 0.05);
                } else {
                    clearInterval(fadeAudio);
                }
            }, 100); 
        }
    }

    /* --- Continue Button Event --- */
    continueBtn.addEventListener("click", () => {
        startMusic();
        continueContainer.style.display = "none";
        typingText.style.display = "block";
        typingText.innerHTML = "";

        typeWriter(typingText, phrase4, 0, () => {
            typingText.innerHTML = ""; 
            typeWriter(typingText, phrase5, 0, () => {
                typingText.style.display = "none"; 
                mainContent.style.display = "block"; 
                mainContent.classList.add("fade-in");
            });
        });
    });

    // --- Post-Yes Sequence (Updated with Time Picker) ---
    function startEndingSequence() {
        questionText.innerHTML = ""; 

        typeWriter(questionText, endPhrase1, 0, () => {
            questionText.innerHTML = ""; 
            typeWriter(questionText, endPhrase2, 0, () => {
                questionText.innerHTML = ""; 
                typeWriter(questionText, endPhrase3, 0, () => {
                questionText.innerHTML = ""; 
                typeWriter(questionText, endPhrase4, 0, () => {
                questionText.innerHTML = ""; 
                typeWriter(questionText, endPhrase5, 0, () => {
                    
                    // Injecting the interactive time picker with a dedicated error placeholder!
questionText.innerHTML = `
    <p style="font-size: 22px; margin-bottom: 15px;">What time works best for you this Friday?</p>
    <input type="time" id="coffee-time" style="padding: 10px; border-radius: 10px; border: 1px solid #6f4e37; font-size: 18px; font-family: inherit; margin-bottom: 15px; color: #5c4033; background: #fff8f0; outline: none;">
    <br>
    <button id="submit-time-btn" style="background-color: #6f4e37; color: white; padding: 12px 24px; font-size: 18px; border-radius: 50px; border: none; cursor: pointer; transition: transform 0.2s;">Confirm Time ☕</button>
    <div id="error-message" style="color: #d32f2f; font-size: 15px; font-weight: bold; margin-top: 15px; min-height: 20px;"></div>
`;

// Adding the click event to send the data
const submitBtn = document.getElementById("submit-time-btn");
submitBtn.addEventListener("click", () => {
    const selectedTime = document.getElementById("coffee-time").value;
    const errorDiv = document.getElementById("error-message");
    
    if (selectedTime) {
        errorDiv.innerText = ""; // Clear any previous error

        // Convert 24h format to 12h format for the frontend display
        const [hours, minutes] = selectedTime.split(':');
        const suffix = hours >= 12 ? "PM" : "AM";
        const displayHours = hours % 12 || 12;
        const formattedTime = `${displayHours}:${minutes} ${suffix}`;

        // Send the raw time to your Discord
        sendTime(formattedTime); 
        
        // Update the screen with a final success message
        questionText.innerHTML = `Perfect! I'll see you this Friday at SM Dasma at ${formattedTime}. 🎉<br>`;
    } else {
        // Update the dedicated error div instead of modifying the whole innerHTML
        errorDiv.innerText = "Please pick a time cutiee!";
        
        // Optional flair: Make the input box wiggle slightly to draw attention to it
        const timeInput = document.getElementById("coffee-time");
        timeInput.style.transform = "translateX(-5px)";
        setTimeout(() => timeInput.style.transform = "translateX(5px)", 100);
        setTimeout(() => timeInput.style.transform = "translateX(0)", 200);
    }
});

                         });
                    });
                });
            });
        });
    }

    /* --- The Interactive Logic --- */
    const noButton = document.getElementById("no-btn");
    const yesButton = document.getElementById("yes-btn");
    const buttonContainer = document.querySelector(".button-container");
    const modalElement = document.querySelector(".modal"); 

    let yesFontSize = 18;
    let yesPaddingV = 12; 
    let yesPaddingH = 24; 

    let noFontSize = 18;
    let noPaddingV = 12;
    let noPaddingH = 24;

    let noClickCount = 0; 
    let emojisToSpawn = 4; 
    let lastSpawnCount = 4; 

    function shrinkNoGrowYes() {
        startMusic(); 
        noClickCount++;

        const currentEmoji = noClickCount >= 5 ? "🥺" : "😭";
        lastSpawnCount = Math.floor(emojisToSpawn);
        
        const modalRect = modalElement.getBoundingClientRect();
        
        for (let i = 0; i < lastSpawnCount; i++) {
            const emoji = document.createElement("div");
            emoji.classList.add("burst-emoji"); 
            emoji.innerText = currentEmoji;

            const randomX = modalRect.left + (Math.random() * (modalRect.width - 30));
            const randomY = modalRect.top + (Math.random() * (modalRect.height - 30));

            emoji.style.left = `${randomX}px`;
            emoji.style.top = `${randomY}px`;

            document.body.appendChild(emoji);

            setTimeout(() => { emoji.remove(); }, 1500);
        }

        emojisToSpawn *= 1.5;

        yesFontSize += 15; 
        yesPaddingV += 10;
        yesPaddingH += 20;

        noFontSize -= 2;
        noPaddingV -= 2;
        noPaddingH -= 2;

        if (noFontSize < 0) noFontSize = 0;
        if (noPaddingV < 0) noPaddingV = 0;
        if (noPaddingH < 0) noPaddingH = 0;

        yesButton.style.fontSize = `${yesFontSize}px`;
        yesButton.style.padding = `${yesPaddingV}px ${yesPaddingH}px`;

        noButton.style.fontSize = `${noFontSize}px`;
        noButton.style.padding = `${noPaddingV}px ${noPaddingH}px`;
        
        if (noFontSize === 0) {
            noButton.style.display = "none";
        }
    }

    noButton.addEventListener("click", shrinkNoGrowYes);

    yesButton.addEventListener("click", () => {
        startMusic();

        buttonContainer.style.display = "none"; 
        document.body.classList.add("success");

        const modalRect = modalElement.getBoundingClientRect();
        for (let i = 0; i < lastSpawnCount; i++) {
            const emoji = document.createElement("div");
            emoji.classList.add("burst-emoji"); 
            
            // Includes the pastry emojis in the success burst as well!
            const successEmojis = ["☕", "🥐", "🍪", "🤎", "✨"];
            emoji.innerText = successEmojis[Math.floor(Math.random() * successEmojis.length)]; 

            const randomX = modalRect.left + (Math.random() * (modalRect.width - 30));
            const randomY = modalRect.top + (Math.random() * (modalRect.height - 30));

            emoji.style.left = `${randomX}px`;
            emoji.style.top = `${randomY}px`;

            document.body.appendChild(emoji);

            setTimeout(() => { emoji.remove(); }, 1500);
        }

        startEndingSequence();
    });
</script>

</body>
</html>
